const fmt = (n) => new Intl.NumberFormat("fr-FR").format(n) + " FCFA";
const todayISO = () => new Date().toISOString().slice(0, 10);
const daysUntil = (d) => Math.ceil((new Date(d) - new Date(todayISO())) / 86400000);

function paidFor(student, payments) {
  return payments.filter((p) => p.studentId === student.id && p.statut === "Validé").reduce((s, p) => s + p.montant, 0);
}
function niveauIconName(niveau) {
  switch (niveau) {
    case "Maternelle": return "book-open";
    case "Lycée": case "Grande École": return "graduation-cap";
    default: return "school";
  }
}

/* ------------------------------------------------------------------ */
/*  APP                                                                */
/* ------------------------------------------------------------------ */

function ScolaPay() {
  const [students, setStudents] = useState(seedStudents);
  const [payments, setPayments] = useState(seedPayments);
  const [session, setSession] = useState(null);
  const [tab, setTab] = useState("dashboard");
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [payFlow, setPayFlow] = useState(null);
  const [toast, setToast] = useState(null);
  const [search, setSearch] = useState("");
  const [recu, setRecu] = useState(null);

  function notify(msg) { setToast(msg); setTimeout(() => setToast(null), 3200); }

  function handleLogin(sess) {
    setSession(sess);
    setTab(sess.role === "admin" ? "dashboard" : "students");
  }

  if (!session) return <LoginScreen students={students} onLogin={handleLogin} />;
  const isAdmin = session.role === "admin";

  function handleLogout() { setSession(null); setTab("dashboard"); setSelectedStudent(null); }

  function saveStudent(data) {
    if (data.id) {
      setStudents((prev) => prev.map((s) => (s.id === data.id ? { ...s, ...data } : s)));
      notify("Fiche élève mise à jour.");
    } else {
      const id = "s" + Math.random().toString(36).slice(2, 8);
      const matricule = "ABS-2526-" + String(1000 + students.length + 1).slice(-4);
      setStudents((prev) => [...prev, { ...data, id, matricule }]);
      notify("Élève ajouté au registre.");
    }
    setShowForm(false); setEditing(null);
  }

  function deleteStudent(id) {
    setStudents((prev) => prev.filter((s) => s.id !== id));
    setPayments((prev) => prev.filter((p) => p.studentId !== id));
    setSelectedStudent(null);
    notify("Élève retiré du registre.");
  }

  function recordPayment(studentId, montant, methode, reference) {
    const id = "p" + Math.random().toString(36).slice(2, 8);
    const payment = { id, studentId, montant, date: todayISO(), methode, reference, statut: "Validé" };
    setPayments((prev) => [payment, ...prev]);
    notify("Paiement confirmé et ajouté à l'historique.");
    setPayFlow(null);
    setRecu({ payment, student: students.find((s) => s.id === studentId) });
  }

  const alerts = useMemo(() => {
    const list = [];
    students.forEach((s) => {
      const paid = paidFor(s, payments);
      let running = 0;
      s.echeances.forEach((e) => {
        running += e.montant;
        const covered = paid >= running;
        const d = daysUntil(e.dateLimite);
        if (!covered && d <= 15) list.push({ studentId: s.id, student: s, label: e.label, montant: e.montant, dateLimite: e.dateLimite, joursRestants: d, retard: d < 0 });
      });
    });
    return list.sort((a, b) => a.joursRestants - b.joursRestants);
  }, [students, payments]);

  const visibleStudents = isAdmin ? students : students.filter((s) => s.id === session.studentId);
  const filteredStudents = visibleStudents.filter((s) => `${s.nom} ${s.prenom} ${s.matricule} ${s.classe}`.toLowerCase().includes(search.toLowerCase()));
  const totalAttendu = students.reduce((sum, s) => sum + s.fraisTotal, 0);
  const totalEncaisse = payments.filter((p) => p.statut === "Validé").reduce((s, p) => s + p.montant, 0);

  return (
    <div style={S.app}>
      <aside style={S.sidebar}>
        <div style={S.brand}>
          <div style={S.brandMark}>SP</div>
          <div><div style={S.brandName}>ScolaPay</div><div style={S.brandSub}>AB Soft Work</div></div>
        </div>
        <nav style={S.nav}>
          {isAdmin && <>
            <NavItem icon="trending-up" label="Tableau de bord" active={tab === "dashboard"} onClick={() => { setTab("dashboard"); setSelectedStudent(null); }} />
            <NavItem icon="users" label="Registre élèves" active={tab === "students"} onClick={() => { setTab("students"); setSelectedStudent(null); }} />
            <NavItem icon="credit-card" label="Paiements" active={tab === "payments"} onClick={() => { setTab("payments"); setSelectedStudent(null); }} />
          </>}
          {!isAdmin && <NavItem icon="user" label="Mon profil" active={tab === "students"} onClick={() => setTab("students")} />}
          <NavItem icon="bell" label={`Alertes${alerts.length ? ` (${alerts.length})` : ""}`} active={tab === "alerts"} onClick={() => { setTab("alerts"); setSelectedStudent(null); }} />
        </nav>
        <div style={S.sidebarFooter}>
          <div style={S.sessionBadge}><Icon name="shield-check" size={14} color="#E8763C" /><span>{isAdmin ? "Session administrateur" : "Session élève"}</span></div>
          <button style={S.logoutBtn} onClick={handleLogout}><Icon name="log-out" size={15} /> Déconnexion</button>
        </div>
      </aside>

      <main style={S.main}>
        {tab === "dashboard" && isAdmin && (
          <Dashboard students={students} payments={payments} totalAttendu={totalAttendu} totalEncaisse={totalEncaisse} alerts={alerts} onOpenStudent={(s) => { setSelectedStudent(s); setTab("students"); }} />
        )}
        {tab === "students" && !selectedStudent && (
          <StudentList isAdmin={isAdmin} students={filteredStudents} payments={payments} search={search} setSearch={setSearch} onSelect={setSelectedStudent} onAdd={() => { setEditing(null); setShowForm(true); }} />
        )}
        {tab === "students" && selectedStudent && (
          <StudentProfile student={selectedStudent} payments={payments.filter((p) => p.studentId === selectedStudent.id)} isAdmin={isAdmin}
            onBack={() => setSelectedStudent(null)} onEdit={() => { setEditing(selectedStudent); setShowForm(true); }}
            onDelete={() => deleteStudent(selectedStudent.id)} onPay={() => setPayFlow({ studentId: selectedStudent.id })}
            onRecu={(p) => setRecu({ payment: p, student: selectedStudent })} />
        )}
        {tab === "payments" && isAdmin && <PaymentsView students={students} payments={payments} onRecu={(p, st) => setRecu({ payment: p, student: st })} />}
        {tab === "alerts" && (
          <AlertsView alerts={isAdmin ? alerts : alerts.filter((a) => a.studentId === session.studentId)}
            onOpenStudent={isAdmin ? (s) => { setSelectedStudent(s); setTab("students"); } : null}
            onPay={isAdmin ? null : (id) => setPayFlow({ studentId: id })} />
        )}
      </main>

      {showForm && <StudentFormModal initial={editing} onClose={() => { setShowForm(false); setEditing(null); }} onSave={saveStudent} />}

      {payFlow && (
        <PaymentModal
          student={students.find((s) => s.id === payFlow.studentId)}
          solde={students.find((s) => s.id === payFlow.studentId).fraisTotal - paidFor(students.find((s) => s.id === payFlow.studentId), payments)}
          onClose={() => setPayFlow(null)} onConfirm={recordPayment} />
      )}

      {recu && <RecuModal payment={recu.payment} student={recu.student} onClose={() => setRecu(null)} />}

      {toast && <div style={S.toast}><Icon name="check" size={15} /> {toast}</div>}
    </div>
  );
}

/* ---------- CONNEXION ---------- */
function LoginScreen({ students, onLogin }) {
  const [mode, setMode] = useState("eleve");
  const [matricule, setMatricule] = useState("");
  const [adminUser, setAdminUser] = useState("");
  const [error, setError] = useState("");

  function submit(e) {
    e.preventDefault();
    if (mode === "eleve") {
      const found = students.find((s) => s.matricule.toLowerCase() === matricule.trim().toLowerCase());
      if (!found) { setError("Matricule introuvable. Vérifiez le numéro communiqué par l'école."); return; }
      onLogin({ role: "eleve", studentId: found.id });
    } else {
      if (!adminUser.trim()) { setError("Veuillez saisir votre identifiant."); return; }
      onLogin({ role: "admin", name: adminUser });
    }
  }

  return (
    <div style={S.loginWrap}>
      <div style={S.loginCard}>
        <div style={S.loginBrandMark}>SP</div>
        <h1 style={S.loginTitle}>ScolaPay</h1>
        <p style={S.loginSub}>Gestion de la scolarité — Côte d'Ivoire</p>
        <div style={S.modeSwitch}>
          <button style={mode === "eleve" ? S.modeBtnActive : S.modeBtn} onClick={() => { setMode("eleve"); setError(""); }}>Espace élève / parent</button>
          <button style={mode === "admin" ? S.modeBtnActive : S.modeBtn} onClick={() => { setMode("admin"); setError(""); }}>Espace administration</button>
        </div>
        <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {mode === "eleve" ? (
            <label style={S.label}>Numéro matricule
              <input style={S.input} placeholder="ex : ABS-2526-0142" value={matricule} onChange={(e) => setMatricule(e.target.value)} />
              <span style={S.hint}>Essayez : ABS-2526-0142, ABS-2526-0198, ABS-2526-0231 ou ABS-2526-0077</span>
            </label>
          ) : (
            <label style={S.label}>Identifiant administrateur
              <input style={S.input} placeholder="ex : direction.abs" value={adminUser} onChange={(e) => setAdminUser(e.target.value)} />
            </label>
          )}
          {error && <div style={S.errorBox}><Icon name="alert-triangle" size={14} /> {error}</div>}
          <button type="submit" style={S.primaryBtn}><Icon name="log-in" size={16} /> Se connecter</button>
        </form>
      </div>
    </div>
  );
}

/* ---------- TABLEAU DE BORD ---------- */
function Dashboard({ students, payments, totalAttendu, totalEncaisse, alerts, onOpenStudent }) {
  const taux = totalAttendu ? Math.round((totalEncaisse / totalAttendu) * 100) : 0;
  const parNiveau = NIVEAUX.map((n) => ({ niveau: n, count: students.filter((s) => s.niveau === n).length })).filter((n) => n.count > 0);

  return (
    <div>
      <PageHeader title="Tableau de bord" subtitle="Vue d'ensemble de la scolarité — année 2026 / 2027" />
      <div style={S.kpiRow}>
        <KpiCard icon="users" label="Élèves inscrits" value={students.length} accent="#1B2A4A" />
        <KpiCard icon="wallet" label="Montant attendu" value={fmt(totalAttendu)} accent="#3D4759" />
        <KpiCard icon="credit-card" label="Montant encaissé" value={fmt(totalEncaisse)} accent="#2F9E44" />
        <KpiCard icon="alert-triangle" label="Alertes actives" value={alerts.length} accent="#D64545" />
      </div>
      <div style={S.dashGrid}>
        <div style={S.panel}>
          <div style={S.panelHead}>Taux de recouvrement</div>
          <div style={S.progressOuter}><div style={{ ...S.progressInner, width: `${taux}%` }} /></div>
          <div style={S.progressLabel}>{taux}% des frais de scolarité recouvrés à ce jour</div>
          <div style={S.panelHead2}>Répartition par niveau</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {parNiveau.map((n) => (
              <div key={n.niveau} style={S.niveauRow}>
                <span style={{ display: "flex", alignItems: "center", gap: 8 }}><Icon name={niveauIconName(n.niveau)} size={15} /> {n.niveau}</span>
                <span style={S.niveauCount}>{n.count} élève{n.count > 1 ? "s" : ""}</span>
              </div>
            ))}

function StudentFormModal({ initial, onClose, onSave }) {
  const [form, setForm] = useState(initial || {
    nom: "", prenom: "", niveau: "Primaire", classe: "", dateNaissance: "",
    parent: { nom: "", tel: "", email: "", lien: "Père" },
    fraisTotal: 300000,
    echeances: [
      { label: "1er versement", montant: 100000, dateLimite: "2026-09-15" },
      { label: "2e versement", montant: 100000, dateLimite: "2026-12-15" },
      { label: "3e versement", montant: 100000, dateLimite: "2027-03-15" },
    ],
  });
  function set(field, value) { setForm((f) => ({ ...f, [field]: value })); }
  function setParent(field, value) { setForm((f) => ({ ...f, parent: { ...f.parent, [field]: value } })); }
  function submit(e) { e.preventDefault(); if (!form.nom || !form.prenom || !form.classe || !form.parent.tel) return; onSave(form); }

  return (
    <div style={S.modalOverlay} onClick={onClose}>
      <div style={S.modalBox} onClick={(e) => e.stopPropagation()}>
        <div style={S.modalHead}><div style={S.modalTitle}>{initial ? "Modifier la fiche élève" : "Ajouter un élève"}</div><button style={S.iconBtn} onClick={onClose}><Icon name="x" size={16} /></button></div>
        <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 14, maxHeight: "70vh", overflowY: "auto", paddingRight: 4 }}>
          <div style={S.formRow}>
            <label style={S.label}>Nom<input style={S.input} value={form.nom} onChange={(e) => set("nom", e.target.value)} required /></label>
            <label style={S.label}>Prénom(s)<input style={S.input} value={form.prenom} onChange={(e) => set("prenom", e.target.value)} required /></label>
          </div>
          <div style={S.formRow}>
            <label style={S.label}>Niveau<select style={S.input} value={form.niveau} onChange={(e) => set("niveau", e.target.value)}>{NIVEAUX.map((n) => <option key={n} value={n}>{n}</option>)}</select></label>
            <label style={S.label}>Classe<input style={S.input} value={form.classe} onChange={(e) => set("classe", e.target.value)} required /></label>
          </div>
          <label style={S.label}>Date de naissance<input type="date" style={S.input} value={form.dateNaissance} onChange={(e) => set("dateNaissance", e.target.value)} /></label>
          <div style={S.formDivider}>Parent / Tuteur</div>
          <div style={S.formRow}>
            <label style={S.label}>Nom complet<input style={S.input} value={form.parent.nom} onChange={(e) => setParent("nom", e.target.value)} required /></label>
            <label style={S.label}>Lien<select style={S.input} value={form.parent.lien} onChange={(e) => setParent("lien", e.target.value)}><option>Père</option><option>Mère</option><option>Tuteur</option></select></label>
          </div>
          <div style={S.formRow}>
            <label style={S.label}>Téléphone<input style={S.input} value={form.parent.tel} onChange={(e) => setParent("tel", e.target.value)} placeholder="+225 ..." required /></label>
            <label style={S.label}>E-mail<input type="email" style={S.input} value={form.parent.email} onChange={(e) => setParent("email", e.target.value)} /></label>
          </div>
          <div style={S.formDivider}>Frais de scolarité</div>
          <label style={S.label}>Montant total annuel (FCFA)<input type="number" style={S.input} value={form.fraisTotal} onChange={(e) => set("fraisTotal", Number(e.target.value))} /></label>
          <button type="submit" style={S.primaryBtn}><Icon name="check" size={16} /> {initial ? "Enregistrer les modifications" : "Ajouter l'élève"}</button>
        </form>
      </div>
    </div>
  );
}

/* ---------- PAIEMENT MOBILE MONEY (SIMULATION) ---------- */
function PaymentModal({ student, solde, onClose, onConfirm }) {
  const [step, setStep] = useState(1);
  const [operateur, setOperateur] = useState(null);
  const [montant, setMontant] = useState(Math.min(solde, 100000));
  const [numero, setNumero] = useState("");
  const [otp, setOtp] = useState("");
  const [processing, setProcessing] = useState(false);

  function launchPayment() { setProcessing(true); setTimeout(() => { setProcessing(false); setStep(3); }, 1200); }
  function confirmOtp() {
    setProcessing(true);
    setTimeout(() => {
      setProcessing(false);
      const ref = operateur.id.toUpperCase() + Date.now().toString().slice(-8) + "-" + Math.floor(Math.random() * 900 + 100);
      onConfirm(student.id, montant, operateur.id, ref);
    }, 1100);
  }

  return (
    <div style={S.modalOverlay} onClick={onClose}>
      <div style={S.modalBoxSm} onClick={(e) => e.stopPropagation()}>
        <div style={S.modalHead}><div style={S.modalTitle}>Paiement de scolarité</div><button style={S.iconBtn} onClick={onClose}><Icon name="x" size={16} /></button></div>
        <div style={S.payStudentLine}>{student.prenom} {student.nom} · {student.matricule}</div>
        <div style={S.payBalanceLine}>Solde restant dû : <strong>{fmt(solde)}</strong></div>
        {step === 1 && (
          <div>
            <div style={S.panelHead2}>Choisissez un opérateur mobile money</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {OPERATEURS.map((o) => (
                <button key={o.id} style={{ ...S.opChoice, borderColor: operateur?.id === o.id ? o.color : "#E4E7EC" }} onClick={() => setOperateur(o)}>
                  <div style={{ ...S.opDot, background: o.color, width: 12, height: 12 }} />{o.label}
                </button>
              ))}
            </div>
            <button style={{ ...S.primaryBtn, marginTop: 18, opacity: operateur ? 1 : 0.5 }} disabled={!operateur} onClick={() => setStep(2)}>Continuer <Icon name="chevron-right" size={15} /></button>
          </div>
        )}
        {step === 2 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <label style={S.label}>Montant à payer (FCFA)<input type="number" style={S.input} value={montant} max={solde} onChange={(e) => setMontant(Math.min(Number(e.target.value), solde))} /></label>
            <label style={S.label}>Numéro {operateur.label}<input style={S.input} placeholder="07 XX XX XX XX" value={numero} onChange={(e) => setNumero(e.target.value)} /></label>
            <button style={{ ...S.primaryBtn, opacity: numero && montant > 0 ? 1 : 0.5 }} disabled={!numero || montant <= 0 || processing} onClick={launchPayment}>
              {processing ? "Envoi de la demande…" : <>Payer {fmt(montant)}</>}
            </button>
            <div style={S.apiNote}><Icon name="landmark" size={13} /> Transaction sécurisée via agrégateur mobile money (API {operateur.label})</div>
          </div>
        )}
        {step === 3 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div style={S.emptyNote}>Un code de confirmation a été envoyé par {operateur.label} au {numero || "numéro renseigné"}. Saisissez-le ci-dessous.</div>
            <label style={S.label}>Code de confirmation<input style={S.input} placeholder="••••" value={otp} onChange={(e) => setOtp(e.target.value)} /></label>
            <button style={{ ...S.primaryBtn, opacity: otp.length >= 4 ? 1 : 0.5 }} disabled={otp.length < 4 || processing} onClick={confirmOtp}>
              {processing ? "Vérification…" : "Confirmer le paiement"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}
